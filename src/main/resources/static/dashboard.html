<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quizzo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="container">

  <header>
    <nav>
      <p>
        <a href="index.html">Quizzo</a>
      </p>
      <button><a href="#">User's dashboard</a></button>
    </nav>
  </header>

  <div class="separate-line"></div>
  <p class="error-mess-global" style="display: none">Something went wrong. Try again.</p>

  <main id="dashboard-main">

    <h2>Welcome, Robert!</h2>

    <div class="dashboard-wrapper">
      <section class="actions">

        <div class="entry-code">
          <form>
            <input type="text" maxlength="5" placeholder="Code"/>
            <button type="submit">Enter the code</button>
          </form>
        </div>

        <div>
          <button class="create-test">Create test/quiz</button>
        </div>

      </section>

      <section class="summary">
        <fieldset>
          <legend>Test & quiz's history</legend>

          <table>
            <thead>
            <tr>
              <th>Title</th>
              <th>Result</th>
            </tr>
            </thead>
            <tbody>
              <tr>
                <td>Quiz about the nature of human</td>
                <td>75%</td>
              </tr>
              <tr>
                <td>Quiz about the nature of human</td>
                <td>75%</td>
              </tr>
            </tbody>
          </table>

        </fieldset>

        <fieldset>
          <legend>Your active tests/quizzes</legend>

          <table>
            <thead>
            <tr>
              <th>Title</th>
              <th>Code</th>
              <th></th>
            </tr>
            </thead>
            <tbody>
              <tr>
                <td>IT devices test</td>
                <td>C4GF2</td>
                <td>Delete</td>
              </tr>
              <tr>
                <td>IT devices test</td>
                <td>C4GF2</td>
                <td>Delete</td>
              </tr>
            </tbody>
          </table>
        </fieldset>

      </section>
    </div>
  </main>

  <div class="separate-line"></div>

  <footer>
    <p>Developed by Robert Kania 2025</p>
  </footer>
</div>
</body>
</html>
