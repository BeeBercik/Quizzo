<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quizzo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="container">

  <header>
    <nav>
      <p>
        <a href="index.html">Quizzo</a>
      </p>
      <button><a href="#">User's dashboard</a></button>
    </nav>
  </header>

  <div class="separate-line"></div>
  <p class="error-mess-global" style="display: none">Something went wrong. Try again.</p>

  <main id="dashboard-main">

    <h2>Welcome, Robert!</h2>

    <section class="actions">

      <div class="entry-code">
        <form>
          <input type="text" maxlength="5" placeholder="Code"/>
          <button type="submit">Enter the code</button>
        </form>
      </div>

      <div>
        <button class="create-test">Create test/quiz</button>
      </div>

    </section>

    <section class="summary">
      <article>
        <h3>Test & quiz's history</h3>

      </article>

      <article>
        <h3>Your active tests/quizzes</h3>

      </article>
    </section>

  </main>

  <div class="separate-line"></div>

  <footer>
    <p>Developed by Robert Kania 2025</p>
  </footer>
</div>
</body>
</html>
