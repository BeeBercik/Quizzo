<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quizzo</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="./js/main.js" type="module" defer></script>
</head>
<body>
<div id="container">

  <header>
    <nav>
      <p>
        <a href="index.html">Quizzo</a>
      </p>
      <button><a href="dashboard.html">User's dashboard</a></button>
    </nav>
  </header>

  <div class="separate-line"></div>
  <p class="error-mess-global">Something went wrong. Try again.</p>

  <main id="create-main">

    <h2>Create your own test / quiz</h2>

    <form>
      <section class="options">
        <div class="add-opt-wrapper">
          <div class="option">
            <label for="elimination">Bad options elimination</label>
            <input type="checkbox" id="elimination">
          </div>

          <div class="option"> <!-- jesli checkbox nie active to disabled -->
            <label for="quantity">How many eliminations</label>
            <input type="number" id="quantity" min="1">
          </div>
        </div>

        <div class="option">
          <label for="duration">Time duration [min]</label>
          <input type="number" id="duration" min="1">
        </div>
      </section>

      <section class="question">
        <h3>Question #1</h3>

        <label for="q1">Q:</label>
        <input type="text" id="q1" name="q1"/>

        <label for="correct">Correct option:</label>
        <input type="text" id="correct" name="correct"/>

        <div class="bad-options">
          <h4>Bad options</h4>

          <div class="elements">

            <div class="element">
              <label for="bad1">1.</label>
              <input type="text" id="bad1" name="bad1"/>
            </div>
            <div class="element">
              <label for="bad2">2.</label>
              <input type="text" id="bad2" name="bad2"/>
            </div>
            <div class="element">
              <label for="bad3">3.</label>
              <input type="text" id="bad3" name="bad3"/>
            </div>

          </div>
        </div>

        <div class="center-btn">
          <button onclick="addBadResponse()">Add bad response</button>
        </div>
      </section>

      <button type="submit">Create</button>
    </form>

  </main>

  <div class="separate-line"></div>

  <footer>
    <p>Developed by Robert Kania 2025</p>
  </footer>
</div>
</body>
</html>
