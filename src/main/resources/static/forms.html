<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quizzo</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="./js/main.js" type="module" defer></script>
</head>
<body>
<div id="container">

  <header>
    <nav>
      <p>
        <a href="index.html">Quizzo</a>
      </p>
      <button><a href="dashboard.html">User's dashboard</a></button>
    </nav>
  </header>

  <div class="separate-line"></div>
  <p class="error-mess-global">Something went wrong. Try again.</p>

  <main id="forms-main">
    <section>
      <fieldset>
        <legend>Log in</legend>

        <form>
          <div class="form-field">
            <label for="login-username">Login</label>
            <input type="text" name="login" id="login-username"/>
          </div>

          <div class="form-field">
            <label for="login-password">Password</label>
            <input type="password" name="password" id="login-password"/>
          </div>

          <button type="submit">Login</button>
        </form>
      </fieldset>
    </section>

    <section>
      <fieldset>
        <legend>Register</legend>

        <form>
          <div class="form-field">
            <label for="register-login">Login</label>
            <input type="text" name="login" id="register-login"/>
          </div>

          <div class="form-field">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email"/>
          </div>

          <div class="form-field">
            <label for="register-password">Password</label>
            <input type="password" name="password" id="register-password"/>
          </div>

          <button type="submit">Register</button>
        </form>
      </fieldset>
    </section>

  </main>

  <div class="separate-line"></div>

  <footer>
    <p>Developed by Robert Kania 2025</p>
  </footer>
</div>
</body>
</html>
