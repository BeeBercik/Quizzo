<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quizzo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="container">

    <header>
        <nav>
            <p>
                <a href="index.html">Quizzo</a>
            </p>
            <button><a href="dashboard.html">User's dashboard</a></button>
        </nav>
    </header>

    <div class="separate-line"></div>
    <p class="error-mess-global">Something went wrong. Try again.</p>

    <main id="test-main">
        <div class="additional-info">
            <p>Bad option eliminations: 2</p>
            <button>Eliminate bad option</button>
            <p>Remaining time:  30:00</p>
        </div>

        <section class="options">
            <div class="option eliminated-option">
                <p>Red</p>
            </div>
            <div class="option">
                <p>Blue</p>
            </div>
            <div class="option">
                <p>Green</p>
            </div>
            <div class="option">
                <p>Red</p>
            </div>
        </section>

        <section class="q-nav-container">
            <div class="question">
                <p>What color is crocodile?</p>
            </div>
            <nav>
                <button>Next</button>
            </nav>
        </section>
    </main>

    <div class="separate-line"></div>

    <footer>
        <p>Developed by Robert Kania 2025</p>
    </footer>
</div>
</body>
</html>
